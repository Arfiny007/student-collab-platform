version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/student_collab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_collab
    ports:
      - "5432:5432"

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "3001:3000"
    depends_on:
      - server